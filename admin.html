<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DFlix Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { background: #1e1e1e; border-radius: 10px; overflow: hidden; border: 1px solid #333; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #e50914; }
        img { width: 100%; height: 150px; object-fit: cover; }
        .info { padding: 10px; font-size: 12px; text-align: center; color: #bbb; }
        h1 { color: #e50914; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <h1>DFlix Control Center</h1>
    <hr style="border: 1px solid #333; margin-bottom: 30px;">
    
    <div id="gallery" class="grid">
        </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD7gABQ1j1zMFS9AylLCZr-K1hyK0LkIsQ",
            authDomain: "distark.firebaseapp.com",
            databaseURL: "https://distark-default-rtdb.firebaseio.com",
            projectId: "distark",
            storageBucket: "distark.firebasestorage.app",
            messagingSenderId: "819241583845",
            appId: "1:819241583845:web:2231e652310e47e06cc00c",
            measurementId: "G-X175B7NX2K"
        };
        firebase.initializeApp(firebaseConfig);

        const gallery = document.getElementById('gallery');

        // Firebase se images listen karna
        firebase.database().ref('camera_logs').on('child_added', (snap) => {
            const data = snap.val();
            const card = `
                <div class="card">
                    <a href="${data.url}" target="_blank">
                        <img src="${data.url}">
                    </a>
                    <div class="info">${data.timestamp}</div>
                </div>
            `;
            gallery.insertAdjacentHTML('afterbegin', card);
        });
    </script>
</body>
</html>
